<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
body {
    text-align: center;
    font-family: Arial;
    background-color: #f4f4f4;
}

#monTexte {
    font-size: 20px;
    margin: 20px;
    transition: 0.3s; 
}

button {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    background-color: #4CAF50;
    color: white;
    cursor: pointer;
}

button:hover {
    background-color: #45a049;
}
</style>

</head>

<body>

<!-- TEXTE -->
<p id="monTexte">Qui est In</p>

<!-- BOUTONS -->
<button onclick="mettreIn()">Texte1</button>
<button onclick="mettreOut()">Texte2</button>
<button onclick="changerCouleur()">Changer couleur</button>
<button onclick="changerTaille()">Changer taille</button>
<button onclick="couleurAleatoire()">Couleur aléatoire</button>

<script>

// TEXTE IN

function mettreIn() {
    var x = document.getElementById("monTexte"); // récupérer le texte
    x.innerHTML = "Qui est In"; // changer le contenu
}

// TEXTE OUT

function mettreOut() {
    var x = document.getElementById("monTexte");
    x.innerHTML = "Qui est Out";
}

// CHANGER COULEUR (ROUGE)

function changerCouleur() {
    var x = document.getElementById("monTexte");
    
    // Modifier la couleur du texte
    x.style.color = "red";
}

// CHANGER TAILLE (30px)

function changerTaille() {
    var x = document.getElementById("monTexte");
    
    // Modifier la taille
    x.style.fontSize = "30px";
}

// COULEUR ALEATOIRE

function couleurAleatoire() {
    var x = document.getElementById("monTexte");

    // Générer des valeurs aléatoires pour RGB
    var r = Math.floor(Math.random() * 256);
    var g = Math.floor(Math.random() * 256);
    var b = Math.floor(Math.random() * 256);

    // Appliquer la couleur
    x.style.color = "rgb(" + r + "," + g + "," + b + ")";
}

</script>

</body>
</html>
